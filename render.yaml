services:
  - type: web
    name: sku-lookup-worker
    runtime: python
    plan: free
    rootDir: worker
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app_fastapi:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: SEARCH_EXCLUDE_DOMAINS
        sync: false
      - key: TRANSLATE_API_KEY
        sync: false
      - key: TRANSLATE_API_BASE
        value: https://openrouter.ai/api/v1
      - key: TRANSLATE_MODEL
        value: openai/gpt-4o-mini
